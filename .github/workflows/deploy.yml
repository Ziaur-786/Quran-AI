name: "Deploy to EKS"

on:
  push:
    branches: [ main ]
    # Also trigger this when the Docker image finishes building
  workflow_run:
    workflows: ["Docker Cloud Build Test"]
    types:
      - completed
    branches: [ main ]

jobs:
  deploy:
    name: "Deploy App to Kubernetes"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Login to AWS so we can control your EKS cluster
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 2. Tell the cloud server how to talk to your specific EKS cluster
      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name quran-ai-cluster --region us-east-1

      # 3. Apply the YAML manifests we just wrote!
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      # Force Kubernetes to securely download the new Docker image with Zero Downtime
      - name: Rolling Restart Kubernetes
        run: kubectl rollout restart deployment/quran-ai-deployment
